<!DOCTYPE html lang="en">
<html>
  <head>
    <title>Love Letter</title>
    <link rel="icon" href="img/icon_white_heart.webp" type="image/x-icon" />
    <link rel="stylesheet" href="css/start_style.css" />
  </head>
  <body>
    <!-- Fade-in overlay: starts black, will fade out to reveal the game -->
    <div id="game-fade" class="visible"></div>

    <!-- Your game content goes here -->
    <div id="game-root">
      <!-- player -->
       <div id="player" aria-hidden="false">
        <img id="player-sprite" src="./character/stand_r.gif" alt="player" />
       </div>
       <div id="floor">
        <img src="./img/platform-1.png">
       </div>
    </div>
  </body>

  <script src="./js/mouse.js"></script>
  <script src="./js/player.js"></script>
  <img id="sparkles-cr" src="./img/sparkles.png" alt=""/>
  <script>
    // Simple fade-out on page load: remove overlay after a short delay so the browser paints it.
    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('game-fade');
      if (!overlay) return;

      // Give the browser a tick to ensure the black overlay is rendered,
      // then trigger the fade by adding the fade-out class.
      requestAnimationFrame(() => {
        // small timeout so transition is visible on fast loads
        setTimeout(() => overlay.classList.add('fade-out'), 50);
      });

      // remove overlay from DOM after transition to avoid intercepting clicks
      overlay.addEventListener('transitionend', () => {
        overlay.remove();
      }, { once: true });
    });

    // Add this to your player.js or create a new script
function adjustPlayerPosition() {
  const floorImg = document.querySelector('#floor img');
  const player = document.getElementById('player');
  
  if (floorImg && player) {
    // Get the actual height of the floor image
    const floorHeight = floorImg.offsetHeight;
    
    // Position player just above the floor
    // Adjust the 20px offset as needed
    player.style.bottom = (floorHeight + -8) + 'px';
  }
}

// Adjust on load and whenever window resizes
window.addEventListener('load', adjustPlayerPosition);
window.addEventListener('resize', adjustPlayerPosition);
  </script>
</html>
